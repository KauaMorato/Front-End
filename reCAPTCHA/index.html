<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms Field</title>

    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.1.3/material.indigo-pink.min.css">
    <link rel="stylesheet" href="https://rawgit.com/MEYVN-digital/mdl-selectfield/master/mdl-selectfield.min.css">
    <script defer src="https://code.getmdl.io/1.1.3/material.min.js"></script>
    <script defer src="https://rawgit.com/MEYVN-digital/mdl-selectfield/master/mdl-selectfield.min.js"></script>

    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body {
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        form {
            width: 50%;
            box-shadow: 1px 2px 4px grey;
            border-radius: 5px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            padding: 32px;
            text-align: center;
        }

        #my-textarea {
            transform: translateY(-2px);
        }

        .left-side {
            margin-right: 20px;
            display: inline-block;
        }

        .left-side div {
            display: block;
        }

        .left-side fieldset {
            margin: 20px 0;
        }

        .left-side fieldset label {
            padding-right: 20px;
        }

        .right-side {
            vertical-align: top;
            display: inline-block;
        }

        .toolbar-section {
            width: 100%;
            margin-top: 50px;
        }

        .info-section {
            margin: 15px 0;
        }

        .info-section>* {
            display: inline-block;
            vertical-align: top;
        }

        .info-section table {
            margin-right: 20px;
        }

        .info-section ul li {
            padding: 0;
        }

        .sched-wrapper {
            display: inline-block;
            vertical-align: top;
            margin-right: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .sched-table {
            border-collapse: collapse;
            font-size: 14px;
            min-width: 340px;
        }

        .sched-table th {
            text-align: left;
            padding: 10px 14px;
            font-weight: 500;
            font-size: 13px;
            color: #666;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
        }

        .sched-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #eee;
            color: #333;
        }

        .sched-row {
            cursor: pointer;
            transition: background 0.15s;
        }

        .sched-row:hover {
            background: #f0f4ff;
        }

        .sched-row.active {
            background: #e3eaff;
        }

        .sched-row.active td {
            color: #3c4db5;
        }

        .detail-row td {
            padding: 0 !important;
        }

        .detail-panel {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease;
        }

        .detail-panel.open {
            max-height: 120px;
        }

        .detail-inner {
            padding: 12px 16px;
            background: #f9f9f9;
            border-bottom: 1px solid #eee;
            font-size: 13px;
            color: #555;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .detail-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .detail-stat .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #999;
        }

        .detail-stat .stat-value {
            font-size: 15px;
            font-weight: 500;
            color: #333;
        }

        .sched-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-green { background: #e6f4ea; color: #2d7a3a; }
        .badge-amber { background: #fff3e0; color: #b45309; }

        .chevron-icon {
            display: inline-block;
            transition: transform 0.25s;
            font-size: 18px;
            vertical-align: middle;
            color: #999;
        }

        .chevron-icon.open {
            transform: rotate(180deg);
        }

        #subBtn {
            width: 31.5%;
            border-radius: 5px;
        }
    </style>
    <script>
        window.onload = function () {
            materializeControls();
        }

        function materializeControls() {
            materializeTextInputs(); 
            materializeRadioButtons();
            materializeCheckboxes();
            materializeTables();
            materializeLists();
            materializeButton();
        }

        function materializeTextInputs() {
            var label, parentEl;
            document.querySelectorAll('input[type="text"], textarea').forEach(function (control) {
                parentEl = control.parentElement;
                control.classList.add('mdl-textfield__input');
                if (parentEl.tagName != 'DIV') {
                    return;
                }
                parentEl.classList.add('mdl-textfield', 'mdl-js-textfield'); 
                if (label) {
                    label.setAttribute('for', control.id || control.name);
                    label.classList.add('mdl-textfield__label'); 
                }
            });
        }

        function materializeSelects() {
            var label, parentEl;
            document.querySelectorAll('select').forEach(function (control) {
                parentEl = control.parentElement;
                control.classList.add('mdl-selectfield__input');
                if (parentEl.tagName != 'DIV') {
                    return;
                }
                parentEl.classList.add('mdl-selectfield', 'mdl-js-selectfield'); 
                label = parentEl.querySelector('label');
                if (label) {
                    label.setAttribute('for', control.id || control.name);
                    label.classList.add('mdl-selectfield__label'); 
                }
            });
        }

        function materializeRadioButtons() {
            var parentEl;
            document.querySelectorAll('input[type="radio"]').forEach(function (control) {
                parentEl = control.parentElement;
                control.classList.add('mdl-radio__input');
                if (parentEl.tagName === 'LABEL') { 
                    parentEl.setAttribute('for', control.id || control.name);
                    parentEl.classList.add('mdl-radio', 'mdl-js-radio', 'mdl-js-ripple-effect');
                }
            });
        }

        function materializeCheckboxes() {
            var parentEl;
            document.querySelectorAll('input[type="checkbox"]').forEach(function (control) {
                parentEl = control.parentElement;
                control.classList.add('mdl-checkbox__input');
                if (parentEl.tagName === 'LABEL') {
                    parentEl.setAttribute('for', control.id || control.name);
                    parentEl.classList.add('mdl-checkbox', 'mdl-js-checkbox', 'mdl-js-ripple-effect');
                }
            });
        }

        function materializeButton() {
            document.querySelectorAll('button').forEach(function (control) {
                control.classList.add('mdl-button', 'mdl-js-button', 'mdl-button--raised', 'mdl-js-ripple-effect', 'mdl-button--colored');
            });
        }

        function materializeTables() {
            document.querySelectorAll('table').forEach(function (table) { 
                table.classList.add('mdl-data-table', 'mdl-js-data-table');
                table.querySelectorAll('th, td').forEach(function (cell) {
                    cell.classList.add('mdl-data-table__cell--non-numeric'); 
                });
            });
        }

        function materializeLists() {
            document.querySelectorAll('ul').forEach(function (control) {
                control.classList.add('mdl-list');
                control.querySelectorAll('li').forEach(function (li) {
                    li.classList.add('mdl-list__item');
                    li.innerHTML = "<span class='mdl-list__item-primary-content'>" +
                        "<i class='material-icons mdl-list__item-icon'>home</i>" +
                        li.innerText + "</span>"; 
                });
            });
        }
    </script>
</head>

<body>
    <form method="post" id="form">
        <div>
            <div class="left-side">
                <div>
                    <label>Nome Completo:</label>
                    <input type="text" name="full_name" id="name" required />
                </div>
                <div>
                    <label>Email:</label>
                    <input type="text" name="email" id="email" required />
                </div>
                <div>
                    <label>Telefone:</label>
                    <input type="text" name="phone" id="phone" required />
                </div>

                <div class="mdl-selectfield--floating-label">
                    <label>Nível de Formação:</label> 
                    <select name="education" id="Training" required>
                        <option value=""></option>
                        <option value="Ensino Médio">Ensino Médio</option>
                        <option value="Bacharelado">Bacharelado</option> 
                        <option value="Faculdade">Faculdade</option>
                        <option value="Pós-Doutorado">Pós-Doutorado</option>
                    </select>
                </div>

                <div class="mdl-selectfield--floating-label">
                    <label>Gênero</label>
                    <select name="gender" id="gender" required>
                        <option value=""></option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                    </select>
                </div>
            </div>
            <div class="right-side">
                <div>
                    <label for="my-textarea">Descreva suas Experiências<br></label>
                    <textarea rows="16" cols="60" name="description" id="my-textarea" required></textarea>
                </div>
            </div>
        </div>
        <div class="info-section">
            <div class="sched-wrapper">
                <table class="sched-table" id="schedTable">
                    <thead>
                        <tr>
                            <th>Dias</th>
                            <th>Horário do Expediente</th>
                            <th>Intervalo</th>
                            <th style="width:28px;"></th>
                        </tr>
                    </thead>
                    <tbody id="schedBody"></tbody>
                </table>
            </div>
            <fieldset>
                <legend><b>Nós Temos Escritório em:</b></legend> 
                <ul>
                    <li>São Paulo</li>
                    <li>Jundiaí</li>
                    <li>Campinas</li>
                </ul>
            </fieldset>
        </div>

        <div class="form-group">
            <div class="g-recaptcha" data-sitekey="6LckEfEsAAAAAFRxFQv3ZoOQf3cUhOWc33oiYHM4"></div>
        </div>

        <div class="toolbar-section">
            <button type="submit" name="submit" id="subBtn">Enviar</button>
        </div>
    </form>
    <script>
        var schedules = [
            {
                id: 'seg',
                dias: 'Seg-Sex',
                expediente: '09:00 - 17:00',
                intervalo: '12:00 - 12:30',
                cargaHoraria: '7h30',
                frequencia: '5 dias/semana',
                tipoIntervalo: '30 min',
                badge: 'green',
                badgeLabel: 'Dias úteis'
            },
            {
                id: 'sab',
                dias: 'Sábados',
                expediente: '08:00 - 19:00',
                intervalo: '12:00 - 12:15',
                cargaHoraria: '10h45',
                frequencia: '1 dia/semana',
                tipoIntervalo: '15 min',
                badge: 'amber',
                badgeLabel: 'Fim de semana'
            },
            {
                id: 'dom',
                dias: 'Domingo',
                expediente: '06:00 - 22:00',
                intervalo: 'Folga',
                cargaHoraria: '16h',
                frequencia: '1 dia/semana',
                tipoIntervalo: 'Folga',
                badge: 'amber',
                badgeLabel: 'Fim de semana'
            }
        ];

        var openId = null;

        function renderSched() {
            var tbody = document.getElementById('schedBody');
            tbody.innerHTML = '';
            schedules.forEach(function (s) {
                var isOpen = openId === s.id;

                var rowTr = document.createElement('tr');
                rowTr.className = 'sched-row' + (isOpen ? ' active' : '');
                rowTr.innerHTML =
                    '<td><strong>' + s.dias + '</strong></td>' +
                    '<td>' + s.expediente + '</td>' +
                    '<td>' + (s.id === 'dom' ? '<em style="color:#aaa">Folga</em>' : s.intervalo) + '</td>' +
                    '<td><span class="chevron-icon material-icons' + (isOpen ? ' open' : '') + '">expand_more</span></td>';
                rowTr.addEventListener('click', function () {
                    openId = isOpen ? null : s.id;
                    renderSched();
                });

                var detailTr = document.createElement('tr');
                detailTr.className = 'detail-row';
                var detailTd = document.createElement('td');
                detailTd.setAttribute('colspan', '4');
                var panel = document.createElement('div');
                panel.className = 'detail-panel' + (isOpen ? ' open' : '');
                panel.innerHTML =
                    '<div class="detail-inner">' +
                        '<div class="detail-stat"><span class="stat-label">Carga horária</span><span class="stat-value">' + s.cargaHoraria + '</span></div>' +
                        '<div class="detail-stat"><span class="stat-label">Intervalo</span><span class="stat-value">' + s.tipoIntervalo + '</span></div>' +
                        '<div class="detail-stat"><span class="stat-label">Frequência</span><span class="stat-value">' + s.frequencia + '</span></div>' +
                        '<div class="detail-stat"><span class="stat-label">Tipo de dia</span><span class="stat-value"><span class="sched-badge badge-' + s.badge + '">' + s.badgeLabel + '</span></span></div>' +
                    '</div>';
                detailTd.appendChild(panel);
                detailTr.appendChild(detailTd);

                tbody.appendChild(rowTr);
                tbody.appendChild(detailTr);
            });
        }

        renderSched();
    </script>
</body>

</html>
